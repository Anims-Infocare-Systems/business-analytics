<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary Meta ───────────────────────────────────────────────────── -->
  <title>Anims | Business Analytics</title>
  <meta name="description"
    content="Enterprise analytics and ERP dashboard by Anims Infocare Systems. Monitor business KPIs, manage tenants, and analyse data in real-time." />
  <meta name="application-name" content="Anims Business Analytics" />
  <meta name="author" content="Anims Infocare Systems" />

  <!-- ── PWA / Theme ───────────────────────────────────────────────── -->
  <meta name="theme-color" content="#0f0c29" />
  <meta name="color-scheme" content="dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- manifest.webmanifest is auto-injected by vite-plugin-pwa at build time;
       the explicit link ensures dev-server also serves the PWA prompt correctly. -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- ── Apple PWA ──────────────────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anims BA" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- ── Favicon (use small PWA icon — logohead.png is 3 MB) ─────────────── -->
  <link rel="icon" type="image/png" href="/pwa-192.png" />
  <link rel="shortcut icon" href="/pwa-192.png" />
</head>

<body>
  <!-- One-time cleanup of legacy dev SW caches (old config cached Vite modules → OOM) -->
  <script>
    (function () {
      if (!("caches" in window)) return;
      var legacy = ["static-assets", "network-first-fallback", "image-cache", "google-fonts"];
      caches.keys().then(function (keys) {
        keys.forEach(function (k) {
          if (legacy.indexOf(k) !== -1) caches.delete(k);
        });
      });
    })();
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
