<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ── Primary Meta ───────────────────────────────────────────────────── -->
  <title>Anims | Business Analytics</title>
  <meta name="description"
    content="Enterprise analytics and ERP dashboard by Anims Infocare Systems. Monitor business KPIs, manage tenants, and analyse data in real-time." />
  <meta name="application-name" content="Anims Business Analytics" />
  <meta name="author" content="Anims Infocare Systems" />

  <!-- ── PWA / Theme ───────────────────────────────────────────────── -->
  <meta name="theme-color" content="#0f0c29" />
  <meta name="color-scheme" content="dark" />
  <meta name="mobile-web-app-capable" content="yes" />
  <!-- manifest.webmanifest is auto-injected by vite-plugin-pwa at build time;
       the explicit link ensures dev-server also serves the PWA prompt correctly. -->
  <link rel="manifest" href="/manifest.webmanifest" />

  <!-- ── Apple PWA ──────────────────────────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Anims BA" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- ── Favicon ────────────────────────────────────────────────────────── -->
  <link rel="icon" type="image/png" href="/Images/logohead.png" />
  <link rel="shortcut icon" href="/Images/logohead.png" />

  <!-- ── Preload critical assets ────────────────────────────────────────── -->
  <link rel="preload" as="image" href="/Images/LOGIN%20FINAL%20imag%20eand%20curve.png" fetchpriority="high" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
