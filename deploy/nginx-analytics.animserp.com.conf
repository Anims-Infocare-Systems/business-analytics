# Business Analytics ONLY — add as a NEW site; do not edit the other project's vhost.
# Install:
#   cp deploy/nginx-analytics.animserp.com.conf /etc/nginx/sites-available/analytics.animserp.com
#   ln -s /etc/nginx/sites-available/analytics.animserp.com /etc/nginx/sites-enabled/
#   nginx -t && systemctl reload nginx
#
# Change server_name below if you use a different subdomain.

upstream animserp_ba_gunicorn {
    server 127.0.0.1:8001 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name analytics.animserp.com;

    client_max_body_size 20M;

    root /var/www/animserp-ba/frontend;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://animserp_ba_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://animserp_ba_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/animserp-ba/static/;
    }
}
