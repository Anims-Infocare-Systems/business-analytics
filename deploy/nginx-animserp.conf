# Primary vhost for https://animserp.com (no other app on this domain).
# Co-hosting: use deploy/nginx-analytics.animserp.com.conf on a subdomain instead.
#
# /etc/nginx/sites-available/animserp.com

upstream animserp_gunicorn {
    server 127.0.0.1:8001 fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name animserp.com www.animserp.com;

    # Cloudflare terminates HTTPS; origin can stay HTTP on port 80.
    # If you install a local cert (Full strict), add listen 443 ssl and certificates here.

    client_max_body_size 20M;

    root /var/www/animserp/frontend;
    index index.html;

    # React SPA (Login + /AnimsBusinessAnalytics dashboards)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Django API — session cookies, long SQL queries
    location /api/ {
        proxy_pass http://animserp_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    location /admin/ {
        proxy_pass http://animserp_gunicorn;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /var/www/animserp/static/;
    }
}
